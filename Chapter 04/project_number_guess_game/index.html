<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guess Game</title>
  <style>
    body{ font-family: Arial, sans-serif; margin: 24px; }
    .card{ max-width: 720px; border:1px solid #e5e7eb; border-radius: 16px; padding: 16px; background:#f8fafc; }
    button{ padding: 10px 12px; border:0; border-radius: 12px; background:#2563eb; color:#fff; cursor:pointer; font-weight:700; }
    button:hover{ transform: translateY(-1px); }
    code{ background:#0f172a; color:#fff; padding:2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Number Guess Game</h1>
    <p>Click <b>Start</b>. The game will ask for guesses using prompts.</p>
    <p>Tip: Open DevTools → Console for logs.</p>
    <button id="startBtn" type="button">Start</button>
    <p><small>File: <code>game.js</code></small></p>
  </div>

  <script src="game.js"></script>
</body>
</html>
