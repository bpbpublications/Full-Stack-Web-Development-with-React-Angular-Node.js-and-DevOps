# 03_kubernetes_manifests/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chapter13-web
  template:
    metadata:
      labels:
        app: chapter13-web
    spec:
      containers:
        - name: web
          image: my-dockerhub-user/chapter13-web:latest
          ports:
            - containerPort: 3000
