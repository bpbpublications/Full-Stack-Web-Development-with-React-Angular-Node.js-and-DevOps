<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example 02 — Events (click, input, keydown)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Example 02 — Events (click, input, keydown)</h1>
      
<p class="muted">Type in the input and watch the live preview. Press Enter to reset.</p>

<div class="row">
  <input id="name" class="input" placeholder="Type something..." />
  <button id="clear" class="btn danger" type="button">Clear</button>
</div>

<p class="muted">Preview: <span id="preview" class="badge">-</span></p>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
