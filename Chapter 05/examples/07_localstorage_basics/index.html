<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example 07 — localStorage Basics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Example 07 — localStorage Basics</h1>
      
<p class="muted">Type a note and save it. Reload the page and load it again.</p>

<div class="row">
  <input id="note" class="input" placeholder="Write a note..." />
  <button id="save" class="btn" type="button">Save</button>
  <button id="load" class="btn ghost" type="button">Load</button>
  <button id="clear" class="btn danger" type="button">Clear</button>
</div>

<p class="muted">Saved value:</p>
<p id="out" class="badge">-</p>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
