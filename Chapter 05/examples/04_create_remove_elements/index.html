<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example 04 — Create and Remove Elements</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Example 04 — Create and Remove Elements</h1>
      
<p class="muted">Add items to the list. Remove any item using its delete button.</p>

<div class="row">
  <input id="itemText" class="input" placeholder="Enter item..." />
  <button id="add" class="btn" type="button">Add</button>
  <button id="clearAll" class="btn danger" type="button">Clear All</button>
</div>

<ul id="list" class="list"></ul>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
