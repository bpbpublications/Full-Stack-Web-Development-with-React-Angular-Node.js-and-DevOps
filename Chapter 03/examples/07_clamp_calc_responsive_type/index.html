<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Type (clamp/calc)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Responsive Typography</h1>
    <p class="lead">
      This heading and paragraph use <code>clamp()</code> so text scales smoothly.
    </p>

    <div class="panel">
      <h2>Spacing with calc()</h2>
      <p>
        The padding uses <code>calc()</code>. Resize the window and inspect computed values.
      </p>
    </div>
  </main>
</body>
</html>
