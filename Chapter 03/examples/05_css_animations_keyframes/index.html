<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Animations</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Keyframe Animations</h1>
    <p class="muted">The loader uses keyframes and timing functions.</p>

    <div class="row">
      <div class="pulse"></div>
      <div class="dots" aria-label="loading">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="notice">
      Tip: Prefer subtle motion. Add <code>prefers-reduced-motion</code> to respect user settings.
    </div>
  </main>
</body>
</html>
