<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Layout: Sidebar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Menu</h2>
      <a href="#">Dashboard</a>
      <a href="#">Projects</a>
      <a href="#">Settings</a>
      <a href="#">Logout</a>
    </aside>

    <main class="content">
      <header class="top">
        <h1>Dashboard</h1>
        <input class="search" placeholder="Search..." />
      </header>

      <section class="cards">
        <article class="card"><h3>Card 1</h3><p>Grid-based content</p></article>
        <article class="card"><h3>Card 2</h3><p>Flexible layout</p></article>
        <article class="card"><h3>Card 3</h3><p>Responsive columns</p></article>
        <article class="card"><h3>Card 4</h3><p>Clean spacing</p></article>
      </section>
    </main>
  </div>
</body>
</html>
