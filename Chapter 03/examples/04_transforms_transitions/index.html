<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transforms & Transitions</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Transforms & Transitions</h1>
    <p class="muted">Hover over cards to see scale, rotate, and shadow transitions.</p>

    <section class="grid">
      <article class="card">
        <h2>Scale</h2>
        <p>Small scale-up on hover.</p>
      </article>
      <article class="card tilt">
        <h2>Rotate</h2>
        <p>Subtle 3D tilt effect.</p>
      </article>
      <article class="card raise">
        <h2>Lift</h2>
        <p>TranslateY + stronger shadow.</p>
      </article>
    </section>
  </main>
</body>
</html>
