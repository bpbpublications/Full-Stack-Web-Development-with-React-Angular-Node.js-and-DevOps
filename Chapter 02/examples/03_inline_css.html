<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline CSS Example</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 24px;">
  <h1 style="color: #b91c1c; margin-bottom: 6px;">Inline CSS Demo</h1>
  <p style="color: #111827; line-height: 1.6;">
    This paragraph uses inline styles directly on the element.
  </p>
  <p style="background:#fff7ed; border:1px solid #fed7aa; padding:10px; border-radius:10px;">
    Inline CSS is useful for quick testing, but it becomes hard to maintain for large pages.
  </p>
</body>
</html>
