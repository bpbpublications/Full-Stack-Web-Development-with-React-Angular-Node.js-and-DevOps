<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal CSS Example</title>
  <style>
    body { font-family: Verdana, sans-serif; background: #fff; margin: 24px; }
    h1 { color: #0a7a2a; font-size: 28px; }
    p  { color: #222; line-height: 1.6; }
    .note { background: #f0fff4; border-left: 4px solid #0a7a2a; padding: 10px; }
  </style>
</head>
<body>
  <h1>Internal CSS Demo</h1>
  <p>This page styles elements using the <code>&lt;style&gt;</code> tag in the head.</p>
  <p class="note">Internal CSS works well for one page or quick prototypes.</p>
</body>
</html>
