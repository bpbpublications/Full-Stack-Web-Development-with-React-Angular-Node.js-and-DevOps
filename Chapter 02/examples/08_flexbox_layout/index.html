<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexbox Layout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Flexbox</div>
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Docs</a>
      <a href="#">Contact</a>
    </nav>
    <button class="btn">Sign in</button>
  </header>

  <main class="wrap">
    <section class="cards">
      <article class="card">
        <h2>Card A</h2>
        <p>Flexbox handles alignment and spacing easily.</p>
      </article>
      <article class="card">
        <h2>Card B</h2>
        <p>Use <code>gap</code>, <code>justify-content</code>, and <code>align-items</code>.</p>
      </article>
      <article class="card">
        <h2>Card C</h2>
        <p>Cards wrap automatically on smaller screens.</p>
      </article>
    </section>
  </main>
</body>
</html>
