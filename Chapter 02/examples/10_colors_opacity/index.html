<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colors & Opacity</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Colors & Transparency</h1>
  <p class="muted">This page shows HEX, RGB(A), and HSL(A) with opacity.</p>

  <div class="row">
    <div class="swatch hex">HEX</div>
    <div class="swatch rgba">RGBA</div>
    <div class="swatch hsla">HSLA</div>
    <div class="swatch opacity">
      Opacity
      <small>applies to the whole box</small>
    </div>
  </div>
</body>
</html>
