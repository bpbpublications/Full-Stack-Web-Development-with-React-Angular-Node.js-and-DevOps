<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Box Model</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Box Model Demo</h1>

  <div class="box">
    <p><strong>Content</strong> area + <strong>padding</strong> + <strong>border</strong> + <strong>margin</strong></p>
    <p class="muted">Resize the window and inspect the element in DevTools.</p>
  </div>

  <div class="hint">
    Tip: Use <code>box-sizing: border-box</code> to make sizing predictable.
  </div>
</body>
</html>
