<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lists, Tables, Forms</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Styling Lists, Tables, and Forms</h1>

  <section class="panel">
    <h2>Lists</h2>
    <ul class="ul-demo">
      <li>Item one</li>
      <li>Item two</li>
      <li>Item three</li>
    </ul>

    <ol class="ol-demo">
      <li>Step one</li>
      <li>Step two</li>
      <li>Step three</li>
    </ol>
  </section>

  <section class="panel">
    <h2>Table</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Course</th>
          <th>Grade</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Ravi</td><td>Web</td><td>A</td></tr>
        <tr><td>Neha</td><td>DBMS</td><td>B+</td></tr>
        <tr><td>Imran</td><td>AI</td><td>A-</td></tr>
      </tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Form</h2>
    <form class="form">
      <label>Full name</label>
      <input type="text" placeholder="Enter name" />

      <label>Email</label>
      <input type="email" placeholder="name@example.com" />

      <label>Message</label>
      <textarea rows="4" placeholder="Write message"></textarea>

      <button type="button">Submit</button>
    </form>
  </section>
</body>
</html>
