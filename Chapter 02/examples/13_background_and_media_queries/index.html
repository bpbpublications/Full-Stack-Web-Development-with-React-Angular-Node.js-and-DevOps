<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background + Media Queries</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>Responsive Hero</h1>
    <p>Resize the browser to see spacing and layout change.</p>
  </header>

  <main class="wrap">
    <div class="grid">
      <div class="card">
        <img src="../../assets/card.jpg" alt="Sample" />
        <h2>Card One</h2>
        <p>Grid columns change based on screen width.</p>
      </div>
      <div class="card">
        <img src="../../assets/card.jpg" alt="Sample" />
        <h2>Card Two</h2>
        <p>Media queries improve readability.</p>
      </div>
      <div class="card">
        <img src="../../assets/card.jpg" alt="Sample" />
        <h2>Card Three</h2>
        <p>Use flexible units for spacing and type.</p>
      </div>
    </div>
  </main>
</body>
</html>
