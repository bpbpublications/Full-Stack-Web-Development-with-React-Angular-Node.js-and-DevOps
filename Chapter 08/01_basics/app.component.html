<div class="app-shell">
  <h1>{{ title }}</h1>

  <p>Welcome, {{ username }}!</p>

  <div class="counter-box">
    <p>Counter: {{ counter }}</p>
    <button (click)="increment()">Increment</button>
    <button (click)="reset()">Reset</button>
  </div>

  <hr />

  <app-welcome></app-welcome>
</div>
