<h2>User List</h2>

<button type="button" (click)="createUser()">New User</button>

<p *ngIf="loading">Loading...</p>
<p *ngIf="error" class="error">{{ error }}</p>

<table *ngIf="!loading && !error && users.length" class="user-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of users">
      <td>{{ u.id }}</td>
      <td>{{ u.name }}</td>
      <td>{{ u.email }}</td>
      <td>{{ u.role || 'N/A' }}</td>
      <td>
        <button type="button" (click)="editUser(u)">Edit</button>
        <button type="button" (click)="confirmDelete(u)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>

<p *ngIf="!loading && !error && !users.length">
  No users found.
</p>
