<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lists in HTML</title>
</head>
<body>
  <h2>Unordered List</h2>
  <ul>
    <li>Apples</li>
    <li>Bananas</li>
    <li>Cherries</li>
  </ul>

  <h2>Ordered List</h2>
  <ol>
    <li>Step 1</li>
    <li>Step 2</li>
    <li>Step 3</li>
  </ol>

  <h2>Description List</h2>
  <dl>
    <dt>HTML</dt>
    <dd>A markup language for web pages.</dd>
    <dt>CSS</dt>
    <dd>A stylesheet language for styling web pages.</dd>
    <dt>JavaScript</dt>
    <dd>A scripting language for interactive web pages.</dd>
  </dl>
</body>
</html>
