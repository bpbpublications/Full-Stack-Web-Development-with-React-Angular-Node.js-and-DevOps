<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semantic Layout Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header, footer { background: #222; color: #fff; padding: 12px 16px; }
    nav a { color: #fff; margin-right: 12px; text-decoration: none; }
    main { display: flex; gap: 16px; padding: 16px; }
    article { flex: 3; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    aside { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Website Header</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <article>
      <h2>Main Content</h2>
      <p>This section uses semantic tags like &lt;header&gt;, &lt;nav&gt;, &lt;main&gt;, &lt;article&gt;, &lt;aside&gt;, and &lt;footer&gt;.</p>
    </article>

    <aside>
      <h3>Sidebar</h3>
      <ul>
        <li>Recent posts</li>
        <li>Categories</li>
        <li>Archives</li>
      </ul>
    </aside>
  </main>

  <footer>
    <p>&copy; 2025 Simple Semantic Layout</p>
  </footer>
</body>
</html>
